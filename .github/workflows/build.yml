name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # the tag-triggered release step uploads dist assets
    steps:
      # third-party actions are pinned by commit SHA: a retagged action cannot
      # reach the signing secrets. Bump deliberately (comment = human-readable tag).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # decode the optional signing cert; without it the bundle ships unsigned
      # (installs then need Developer Mode for the top-level menu - everything
      # else works the same)
      - name: Prepare signing certificate
        if: ${{ github.event_name != 'pull_request' }}
        shell: powershell
        env:
          PFX_B64: ${{ secrets.SIGNING_PFX_B64 }}
        run: |
          if ($env:PFX_B64) {
            [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\signing.pfx", [Convert]::FromBase64String($env:PFX_B64))
            "HAVE_PFX=1" | Out-File $env:GITHUB_ENV -Append -Encoding ascii
          }

      - name: Build release bundle
        shell: powershell
        env:
          PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}
        run: |
          $v = "$env:GITHUB_REF_NAME" -replace "^v", ""
          if ($v -notmatch "^\d+\.\d+\.\d+$") { $v = "1.0.0" }
          if ($env:HAVE_PFX) {
            .\packaging\make-release.ps1 -IncludeArm64 -Version "$v.0" -PfxPath "$env:RUNNER_TEMP\signing.pfx" -PfxPassword "$env:PFX_PASSWORD"
          } else {
            .\packaging\make-release.ps1 -IncludeArm64 -Version "$v.0"
          }

      - name: Run test suite
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -STA -File tests\run-tests.ps1

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: RobocopyTo-build
          path: dist/

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
